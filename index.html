		<!-- FAQ Structured Data -->
		<script type="application/ld+json">
		{
			"@context": "https://schema.org",
			"@type": "FAQPage",
			"mainEntity": [
				{
					"@type": "Question",
					"name": "Qu'est-ce qu'Aerisys ?",
					"acceptedAnswer": {
						"@type": "Answer",
						"text": "Aerisys est un projet éducatif qui permet aux étudiants, makers et passionnés de robotique de construire leur propre drone. Notre kit open-source comprend tous les composants et la documentation nécessaires pour apprendre l'électronique, la programmation et l'aéronautique."
					}
				},
				{
					"@type": "Question",
					"name": "Quel coût ?",
					"acceptedAnswer": {
						"@type": "Answer",
						"text": "Le kit Aerisys est conçu pour être accessible. Le prix varie selon la configuration choisie, mais notre objectif est de proposer une solution éducative abordable. Contactez-nous pour obtenir un devis personnalisé."
					}
				},
				{
					"@type": "Question",
					"name": "Temps d'assemblage ?",
					"acceptedAnswer": {
						"@type": "Answer",
						"text": "Le temps d'assemblage varie selon votre expérience. Un débutant peut assembler le drone en 4 à 6 heures avec notre guide pas à pas. Les makers expérimentés peuvent le faire en 2 à 3 heures."
					}
				},
				{
					"@type": "Question",
					"name": "Code open source ?",
					"acceptedAnswer": {
						"@type": "Answer",
						"text": "Oui, tout le code source d'Aerisys est disponible en open source. Vous pouvez l'étudier, le modifier et contribuer au projet. Nous croyons en l'apprentissage par la pratique et le partage des connaissances."
					}
				},
				{
					"@type": "Question",
					"name": "Autonomie de vol ?",
					"acceptedAnswer": {
						"@type": "Answer",
						"text": "L'autonomie de vol dépend de la batterie utilisée et des conditions de vol. Avec la batterie standard, vous pouvez voler environ 10 à 15 minutes. Des batteries de plus grande capacité sont disponibles en option."
					}
				}
			]
		}
		</script>
